<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAGI MEMORY // NEURAL MATCH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00f5ff;
      --pink: #ff2d78;
      --purple: #7b2fff;
      --dark: #03040a;
      --dark2: #080c1a;
      --grid: rgba(0,245,255,0.04);
      --glow-c: 0 0 20px rgba(0,245,255,0.6);
      --glow-p: 0 0 20px rgba(255,45,120,0.6);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #e0f0ff;
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* ── 背景グリッド ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* ── 光のライン ── */
    .scanline {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* ── ヘッダー ── */
    header {
      position: relative; z-index: 10;
      padding: 28px 20px 10px;
      text-align: center;
    }

    .title-main {
      font-family: 'Orbitron', monospace;
      font-size: clamp(20px, 5vw, 38px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow: var(--glow-c), 0 0 60px rgba(0,245,255,0.3);
      position: relative;
    }
    .title-main::after {
      content: 'NEURAL MATCH';
      position: absolute;
      inset: 0;
      color: var(--pink);
      text-shadow: var(--glow-p);
      clip-path: polygon(0 55%, 100% 55%, 100% 70%, 0 70%);
      animation: glitch 4s infinite;
    }
    @keyframes glitch {
      0%,92%,100% { transform: none; opacity: 0; }
      93% { transform: translate(-3px, 0); opacity: 0.6; }
      95% { transform: translate(3px, 0); opacity: 0.6; }
      97% { transform: none; opacity: 0; }
    }

    .title-sub {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 0.4em;
      color: rgba(0,245,255,0.5);
      margin-top: 4px;
    }

    /* ── ステータスバー ── */
    .hud {
      position: relative; z-index: 10;
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
      padding: 14px 20px;
      margin: 0 auto; max-width: 700px;
    }

    .hud-item {
      text-align: center;
    }
    .hud-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px; letter-spacing: 0.3em;
      color: rgba(0,245,255,0.45);
    }
    .hud-value {
      font-family: 'Orbitron', monospace;
      font-size: 26px; font-weight: 700;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      line-height: 1.1;
    }

    /* ── ゲームボード ── */
    .board-wrap {
      position: relative; z-index: 5;
      display: flex; justify-content: center; align-items: center;
      padding: 10px 16px 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }

    /* ── カード ── */
    .card {
      aspect-ratio: 3/4;
      cursor: pointer;
      perspective: 800px;
      position: relative;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
    }

    /* 裏面 */
    .card-back {
      background: linear-gradient(135deg, #0a0e1f 0%, #0f1830 100%);
      border: 1px solid rgba(0,245,255,0.2);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-back::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    .card-back::after {
      content: '🐷';
      font-size: clamp(20px, 5vw, 32px);
      filter: drop-shadow(0 0 8px rgba(0,245,255,0.5));
      position: relative; z-index: 1;
    }

    .card:hover:not(.flipped):not(.matched) .card-back {
      border-color: rgba(0,245,255,0.6);
      box-shadow: 0 0 16px rgba(0,245,255,0.25), inset 0 0 20px rgba(0,245,255,0.05);
    }

    /* 表面 */
    .card-front {
      transform: rotateY(180deg);
      border: 1px solid rgba(0,245,255,0.3);
      background: #060a18;
    }
    .card-front img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* マッチ済み */
    .card.matched .card-front {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,245,255,0.5), inset 0 0 20px rgba(0,245,255,0.1);
    }
    .card.matched .card-front::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,245,255,0.12), transparent);
      pointer-events: none;
    }

    /* 不一致フラッシュ */
    .card.wrong .card-front {
      border-color: var(--pink);
      box-shadow: 0 0 20px rgba(255,45,120,0.5);
      animation: wrongShake 0.4s ease;
    }
    @keyframes wrongShake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-5px); }
      75% { transform: rotateY(180deg) translateX(5px); }
    }

    /* ── コントロール ── */
    .controls {
      position: relative; z-index: 10;
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
      padding: 0 16px 28px;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 11px; letter-spacing: 0.2em;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--cyan);
      background: transparent;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      box-shadow: 0 0 10px rgba(0,245,255,0.15);
    }
    .btn:hover {
      background: rgba(0,245,255,0.1);
      box-shadow: var(--glow-c), 0 0 30px rgba(0,245,255,0.2);
    }
    .btn:active { transform: scale(0.96); }

    .btn-back {
      border-color: rgba(0,245,255,0.3);
      color: rgba(0,245,255,0.5);
      text-shadow: none;
      box-shadow: none;
      font-size: 10px;
      text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .btn-back:hover {
      border-color: rgba(0,245,255,0.6);
      color: rgba(0,245,255,0.8);
      box-shadow: none;
      background: rgba(0,245,255,0.05);
    }

    /* ── クリア画面 ── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(3,4,10,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      backdrop-filter: blur(6px);
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .result-box {
      text-align: center;
      border: 1px solid var(--cyan);
      padding: 40px 50px;
      border-radius: 12px;
      background: rgba(8,12,26,0.9);
      box-shadow: var(--glow-c), 0 0 80px rgba(0,245,255,0.1);
      max-width: 90vw;
    }

    .result-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 0.5em;
      color: rgba(0,245,255,0.5);
      margin-bottom: 12px;
    }
    .result-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(26px, 6vw, 44px);
      font-weight: 900;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .result-stats {
      display: flex; gap: 40px; justify-content: center; margin-bottom: 30px;
    }
    .result-stat { text-align: center; }
    .result-stat-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px; letter-spacing: 0.3em;
      color: rgba(0,245,255,0.4);
    }
    .result-stat-val {
      font-family: 'Orbitron', monospace;
      font-size: 30px; font-weight: 700;
      color: var(--cyan);
      text-shadow: var(--glow-c);
    }

    /* パーティクル */
    .particle {
      position: fixed;
      width: 4px; height: 4px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 1s ease-out forwards;
      z-index: 200;
    }
    @keyframes particleFly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* レスポンシブ */
    @media (max-width: 480px) {
      .board { gap: 8px; }
      .hud { gap: 24px; }
    }
  </style>
</head>
<body>

<div class="scanline"></div>

<header>
  <div class="title-main">HAGI MEMORY</div>
  <div class="title-sub">NEURAL MATCH SYSTEM v2.0</div>
</header>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">MOVES</div>
    <div class="hud-value" id="moves">00</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">MATCHED</div>
    <div class="hud-value" id="matched">0<span style="font-size:14px;opacity:0.4">/8</span></div>
  </div>
  <div class="hud-item">
    <div class="hud-label">TIME</div>
    <div class="hud-value" id="timer">00:00</div>
  </div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="controls">
  <button class="btn" id="btnReset">[ RESET ]</button>
  <a href="index.html" class="btn btn-back">← INDEX</a>
</div>

<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-label">MISSION COMPLETE</div>
    <div class="result-title">CLEARED !</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="result-stat-label">MOVES</div>
        <div class="result-stat-val" id="finalMoves">--</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">TIME</div>
        <div class="result-stat-val" id="finalTime">--</div>
      </div>
    </div>
    <button class="btn" id="btnPlayAgain">[ PLAY AGAIN ]</button>
  </div>
</div>

<script>
  const IMAGES = ['g1.jpg','g2.jpg','g3.jpg','g4.jpg','g5.jpg','g6.jpg','g7.jpg','g8.jpg'];
  const board = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const matchedEl = document.getElementById('matched');
  const timerEl = document.getElementById('timer');
  const overlay = document.getElementById('overlay');

  let cards = [], flipped = [], matched = 0, moves = 0;
  let locked = false;
  let timerInterval = null, seconds = 0, started = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function formatTime(s) {
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    seconds = 0;
    timerEl.textContent = '00:00';
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = formatTime(seconds);
    }, 1000);
  }

  function spawnParticles(x, y) {
    const colors = ['#00f5ff','#ff2d78','#7b2fff','#ffffff'];
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.5;
      const dist = 40 + Math.random() * 60;
      p.style.cssText = `
        left:${x}px; top:${y}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --tx:${Math.cos(angle)*dist}px;
        --ty:${Math.sin(angle)*dist}px;
        animation-duration:${0.6+Math.random()*0.4}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  function init() {
    board.innerHTML = '';
    cards = [];
    flipped = [];
    matched = 0;
    moves = 0;
    locked = false;
    started = false;
    if (timerInterval) clearInterval(timerInterval);
    timerEl.textContent = '00:00';
    movesEl.textContent = '00';
    matchedEl.innerHTML = '0<span style="font-size:14px;opacity:0.4">/8</span>';
    overlay.classList.remove('show');

    const deck = shuffle([...IMAGES, ...IMAGES]);

    deck.forEach((src, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.img = src;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">
            <img src="${src}" alt="">
          </div>
        </div>
      `;
      card.addEventListener('click', () => onCardClick(card));

      // 入場アニメーション
      card.style.opacity = '0';
      card.style.transform = 'scale(0.8) translateY(20px)';
      card.style.transition = `opacity 0.4s ${i*0.04}s, transform 0.4s ${i*0.04}s`;
      board.appendChild(card);
      cards.push(card);

      requestAnimationFrame(() => {
        card.style.opacity = '1';
        card.style.transform = '';
      });
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

    if (!started) {
      started = true;
      startTimer();
    }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      locked = true;
      moves++;
      movesEl.textContent = String(moves).padStart(2,'0');
      checkMatch();
    }
  }

  function checkMatch() {
    const [a, b] = flipped;
    if (a.dataset.img === b.dataset.img) {
      // マッチ！
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        a.classList.remove('flipped');
        b.classList.remove('flipped');

        // パーティクル
        const ra = a.getBoundingClientRect();
        const rb = b.getBoundingClientRect();
        spawnParticles(ra.left + ra.width/2, ra.top + ra.height/2);
        spawnParticles(rb.left + rb.width/2, rb.top + rb.height/2);

        matched++;
        matchedEl.innerHTML = `${matched}<span style="font-size:14px;opacity:0.4">/8</span>`;
        flipped = [];
        locked = false;

        if (matched === 8) gameOver();
      }, 300);
    } else {
      // 不一致
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped','wrong');
        b.classList.remove('flipped','wrong');
        flipped = [];
        locked = false;
      }, 900);
    }
  }

  function gameOver() {
    clearInterval(timerInterval);
    document.getElementById('finalMoves').textContent = String(moves).padStart(2,'0');
    document.getElementById('finalTime').textContent = formatTime(seconds);
    setTimeout(() => overlay.classList.add('show'), 600);
  }

  document.getElementById('btnReset').addEventListener('click', init);
  document.getElementById('btnPlayAgain').addEventListener('click', init);

  init();
</script>
</body>
</html>
